# Static site — no build step; serve the repo root as-is
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/case-assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
